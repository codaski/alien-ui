name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI
        run: npm run ci

  release:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
          # Scoped publish: @codaski + public access; auth via NODE_AUTH_TOKEN (project .npmrc).
          registry-url: https://registry.npmjs.org/
          scope: '@codaski'

      - name: Install dependencies
        run: npm ci

      - name: Assert npm publish token (NPM_TOKEN)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "::error::Repository secret NPM_TOKEN is missing or empty. Add an npm granular access token with publish permission for @codaski/* (npm user codaski): GitHub repo → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Publish to npm
        shell: bash
        # Prereleases use dist-tag `beta`. We also point `latest` at the same tarball so the npm
        # package page default matches the newest release from GitHub (pre-1.0; still semver prerelease).
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # Belt-and-suspenders: persist token for this job (fixes ENEEDAUTH if project .npmrc did not pick up NODE_AUTH_TOKEN).
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          VERSION=$(node -p "require('./package.json').version")
          if [[ "${VERSION}" == *-* ]]; then
            npm publish --access public --tag beta
            # Keep npm's default "Version" / `npm install pkg` aligned with newest published beta
            npm dist-tag add "@codaski/alien-ui@${VERSION}" latest
          else
            npm publish --access public
          fi
