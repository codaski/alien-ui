name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          # Scoped publish: maps @alien-ui to npm and wires auth via NODE_AUTH_TOKEN (project .npmrc).
          registry-url: https://registry.npmjs.org/
          scope: '@alien-ui'

      - name: Install dependencies
        run: npm ci

      - name: Assert npm publish token (NPM_TOKEN)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "::error::Repository secret NPM_TOKEN is missing or empty. Add an npm granular access token: GitHub repo → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Publish to npm
        shell: bash
        # Prereleases ( hyphen in semver, e.g. 0.1.1-beta ) MUST NOT overwrite npm "latest".
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # Belt-and-suspenders: persist token for this job (fixes ENEEDAUTH if project .npmrc did not pick up NODE_AUTH_TOKEN).
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          VERSION=$(node -p "require('./package.json').version")
          if [[ "${VERSION}" == *-* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
